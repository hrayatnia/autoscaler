name: gha-runner-autoscaler

services:
  autoscaler:
    build: .
    image: gha-runner-autoscaler:dev
    container_name: gha-runner-autoscaler
    restart: unless-stopped
    # Secrets are read from the mounted config.json below, not from the
    # environment - that avoids them showing up in plaintext in `docker
    # inspect`. The binary also supports SMEE_URL/WEBHOOK_SECRET/GH_PAT/
    # PORTAL_TOKEN env vars as a fallback (see internal/config), useful for
    # env-based secret injection (e.g. Kubernetes Secrets), but they are
    # intentionally not wired up here to keep this compose file's single
    # source of truth unambiguous.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.json:/etc/autoscaler/config.json:ro
    ports:
      - "127.0.0.1:8088:8080"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
